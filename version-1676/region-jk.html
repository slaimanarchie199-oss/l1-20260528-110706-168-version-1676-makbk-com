window.CURRENT_CATEGORY_MOVIES = [];
</script>
<script>
(function(){
  const root = document.querySelector('[data-local-root]');
  if (!root || !window.CURRENT_CATEGORY_MOVIES) return;
  const input = document.querySelector('[data-local-filter]');
  const region = document.querySelector('[data-local-region]');
  const type = document.querySelector('[data-local-type]');
  const year = document.querySelector('[data-local-year]');
  const stats = document.querySelector('[data-local-stats]');
  const grid = document.querySelector('[data-local-grid]');
  const years = [...new Set(window.CURRENT_CATEGORY_MOVIES.map(m => m.year))].sort((a,b) => Number(b)-Number(a));
  years.slice(0, 40).forEach(y => {
    const opt = document.createElement('option');
    opt.value = y;
    opt.textContent = y;
    year.appendChild(opt);
  });
  const escape = (s) => String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;');
  const render = () => {
    const q = (input.value || '').trim().toLowerCase();
    const reg = region.value || '';
    const typ = type.value || '';
    const yr = year.value || '';
    const filtered = window.CURRENT_CATEGORY_MOVIES.filter((m) => {
      const hay = [m.title, m.region, m.type, m.year, m.genreRaw, m.oneLine, (m.tags || []).join(' ')].join(' ').toLowerCase();
      return (!q || hay.includes(q)) && (!reg || m.region === reg) && (!typ || m.type === typ) && (!yr || String(m.year) === String(yr));
    });
    stats.textContent = '当前筛选后共 ' + filtered.length + ' 条影片。';
    grid.innerHTML = filtered.map((m) => `
      <a class="movie-card" href="movie-${m.id}.html">
        <div class="movie-poster" style="--cover-image: linear-gradient(135deg, rgba(6,182,212,.24), rgba(59,130,246,.16)), linear-gradient(135deg, rgba(15,23,42,.92), rgba(15,23,42,.72)), url('${m.cover}')">
          <div class="poster-info">
            <div class="poster-top-row"><span class="poster-tag">${escape(m.region)}</span><span class="poster-year">${escape(m.year)}</span></div>
            <div class="poster-btm"><p class="poster-name">${escape(m.title)}</p><p class="poster-line">${escape(m.oneLine || m.genreRaw || '')}</p></div>
          </div>
        </div>
        <div class="movie-body">
          <p class="movie-title">${escape(m.title)}</p>
          <p class="movie-sub">${escape(m.genreRaw)}</p>
          <div class="movie-meta"><span class="meta-item"><svg viewBox="0 0 24 24"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg><span>${escape(m.type)}</span></span><span class="meta-item"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"></rect><path d="M7 3v18"></path><path d="M17 3v18"></path><path d="M3 7.5h4"></path><path d="M3 12h18"></path><path d="M3 16.5h4"></path><path d="M17 7.5h4"></path><path d="M17 16.5h4"></path></svg><span>${escape(m.year)}</span></span></div>
        </div>
      </a>`).join('');
  };
  [input, region, type, year].forEach(el => el && el.addEventListener('input', render));
  [input, region, type, year].forEach(el => el && el.addEventListener('change', render));
  render();
})();
</script>
